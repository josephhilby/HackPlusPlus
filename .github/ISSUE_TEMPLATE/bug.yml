name: Bug Report
description: Report a compiler or tooling bug
title: "[Bug]: "
labels: ["bug"]

body:

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can the bug be reproduced?
      placeholder: |
        1. Write this FreshlyGround program
        2. Compile using ...
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example Source Code
      description: Minimal FreshlyGround example that triggers the bug.
      render: text
      placeholder: |
        DEF main(): Integer DO
            print("hello world");
            RETURN 0;
        END

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Error messages, stack traces, screenshots, etc.